<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login - Shree Manju Homoeopathic Clinic</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
body {
  background: linear-gradient(135deg, #1a5632, #2d8a4e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.login-card {
  max-width: 420px;
  width: 100%;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  padding: 30px;
  text-align: center;
}
.login-card img {
  width: 80px;
  margin-bottom: 15px;
  border-radius: 8px;
}
.login-card h3 {
  color: #1a5632;
  font-weight: 700;
  margin-bottom: 5px;
}
.login-card .subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}
.form-control:focus {
  border-color: #2d8a4e;
  box-shadow: 0 0 0 0.2rem rgba(45,138,78,0.25);
}
.btn-login {
  background: linear-gradient(135deg, #1a5632, #2d8a4e);
  color: white;
  font-weight: 600;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  transition: all 0.3s;
  cursor: pointer;
}
.btn-login:hover {
  background: linear-gradient(135deg, #2d8a4e, #1a5632);
  color: white;
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(45,138,78,0.3);
}
.btn-login:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}
.error-msg {
  color: #dc3545;
  font-size: 14px;
  margin-top: 10px;
  display: none;
}
.success-msg {
  color: #28a745;
  font-size: 14px;
  margin-top: 10px;
  display: none;
}
.footer-text {
  font-size: 12px;
  color: #999;
  margin-top: 15px;
}
.status-badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  margin-top: 8px;
  display: inline-block;
}
.status-online { background: #d4edda; color: #155724; }
.status-offline { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>

<div class="login-card">
  <img src="https://uploads.onecompiler.io/43748udj2/1780742591310/photo_2026-06-06_10-55-18.jpg" alt="Clinic Logo">
  <h3>Shree Manju Homoeopathic Clinic</h3>
  <p class="subtitle">Health Care Centre - Admin Login</p>
  <div id="cloudStatus">
    <span class="status-badge status-offline" id="statusBadge">⚫ Checking connection...</span>
  </div>

  <div class="mb-3 text-start mt-3">
    <label class="form-label">Username</label>
    <input type="text" class="form-control" id="username" placeholder="Enter username" value="admin">
  </div>
  <div class="mb-3 text-start">
    <label class="form-label">Password</label>
    <input type="password" class="form-control" id="password" placeholder="Enter password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">🔐 Login</button>
  <div class="error-msg" id="errorMsg">Invalid username or password!</div>
  <div class="success-msg" id="successMsg">Connecting to cloud database...</div>

  <p class="footer-text">Natural Healing Since 1998 | Mob: 9004530642 | 9695333642</p>
</div>

<script src="firebase-config.js"></script>
<script>
// Listen for Firebase ready event
window.addEventListener('firebaseReady', function() {
  document.getElementById('statusBadge').textContent = '🟢 Cloud Connected';
  document.getElementById('statusBadge').className = 'status-badge status-online';
});

// Fallback: if Firebase doesn't load in 5 seconds, mark as offline
setTimeout(() => {
  const badge = document.getElementById('statusBadge');
  if (badge.textContent.includes('Checking')) {
    badge.textContent = '🟠 Offline Mode (local only)';
    badge.className = 'status-badge status-offline';
  }
}, 5000);

function handleLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const loginBtn = document.getElementById("loginBtn");
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");

  errorMsg.style.display = "none";
  successMsg.style.display = "none";

  if (username === "admin" && password === "Shree@121") {
    loginBtn.disabled = true;
    loginBtn.textContent = "⏳ Logging in...";
    successMsg.style.display = "block";

    // Store login state both locally AND in session for cloud sync
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("clinicUser", username);
    localStorage.setItem("loginTime", new Date().toISOString());

    // Redirect after brief delay to show connection status
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 800);
  } else {
    errorMsg.style.display = "block";
    document.getElementById("password").value = "";
  }
}

document.getElementById("password").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    handleLogin();
  }
});
</script>

</body>
</html>
