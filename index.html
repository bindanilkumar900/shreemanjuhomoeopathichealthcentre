<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login - Shree Manju Homoeopathic Clinic</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(135deg, #1a5632, #2d8a4e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.login-card {
  max-width: 420px;
  width: 100%;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  padding: 30px;
  text-align: center;
}
.login-card img {
  width: 80px;
  margin-bottom: 15px;
  border-radius: 8px;
}
.login-card h3 {
  color: #1a5632;
  font-weight: 700;
  margin-bottom: 5px;
}
.login-card .subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}
.form-control:focus {
  border-color: #2d8a4e;
  box-shadow: 0 0 0 0.2rem rgba(45,138,78,0.25);
}
.btn-login {
  background: linear-gradient(135deg, #1a5632, #2d8a4e);
  color: white;
  font-weight: 600;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  transition: all 0.3s;
  cursor: pointer;
}
.btn-login:hover {
  background: linear-gradient(135deg, #2d8a4e, #1a5632);
  color: white;
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(45,138,78,0.3);
}
.error-msg {
  color: #dc3545;
  font-size: 14px;
  margin-top: 10px;
  display: none;
}
.footer-text {
  font-size: 12px;
  color: #999;
  margin-top: 15px;
}
</style>
</head>
<body>

<div class="login-card">
  <img src="https://uploads.onecompiler.io/43748udj2/1780742591310/photo_2026-06-06_10-55-18.jpg" alt="Clinic Logo">
  <h3>Shree Manju Homoeopathic Clinic</h3>
  <p class="subtitle">Health Care Centre - Admin Login</p>
  
  <div class="mb-3 text-start">
    <label class="form-label">Username</label>
    <input type="text" class="form-control" id="username" placeholder="Enter username" value="admin">
  </div>
  <div class="mb-3 text-start">
    <label class="form-label">Password</label>
    <input type="password" class="form-control" id="password" placeholder="Enter password">
  </div>
  
  <button class="btn-login" onclick="handleLogin()">🔐 Login</button>
  <div class="error-msg" id="errorMsg">Invalid username or password!</div>
  
  <p class="footer-text">Natural Healing Since 1998 | Mob: 9004530642 | 9695333642</p>
</div>

<script>
function handleLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  
  if (username === "admin" && password === "Shree@121") {
    localStorage.setItem("isLoggedIn", "true");
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("password").value = "";
  }
}

document.getElementById("password").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    handleLogin();
  }
});
</script>

</body>
</html>
